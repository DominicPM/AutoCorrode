# Composite action to setup Isabelle
# NOTE: Needs to be run under the makarius/isabelle:Isabelle2025-2 container
name: Setup Isabelle
description: 'Setup Isabelle: checkout the AFP, set environment variables, cache heap images'
runs:
  using: "composite"
  steps:
    - name: Checkout AFP
      uses: actions/checkout@v3
      with:
        repository: isabelle-prover/mirror-afp-2025-1
        path: afp

    - name: Patch AFP Isabelle/C parser
      shell: bash
      run: |
        TARGET=afp/thys/Isabelle_C/C11-FrontEnd/src/C_Parser_Language.thy
        sed -i \
          '/| (CDecl0 (\[CTypeSpec0 (CIntType0 _)\], \[\], _)) => ("int",decl)/{
            n
            c\                  | (CDecl0 (_, [((Some (CDeclr0 (nameIdent,_,_,_,_)),_),_)], _)) =>\n                      (getVarName nameIdent, decl)\n                  | (CDecl0 (_, [], _)) => ("unknown", decl)\n                  | dd => ("unknown", dd)
          }' "$TARGET"

    - name: Set AFP component base
      shell: bash
      run: |
        echo "AFP_COMPONENT_BASE=afp/thys" >> $GITHUB_ENV

    - name: Set Isabelle home
      shell: bash
      run: |
        echo "$(/home/isabelle/Isabelle/bin/isabelle getenv ISABELLE_HOME)" >> $GITHUB_ENV

    - name: Set Isabelle home user
      shell: bash
      run: |
        echo "$($ISABELLE_HOME/bin/isabelle getenv ISABELLE_HOME_USER)" >> $GITHUB_ENV

    - name: Set Isabelle binary
      shell: bash
      run: |
        echo "ISABELLE=$ISABELLE_HOME/bin/isabelle" >> $GITHUB_ENV

    - name: Cache heap images
      uses: actions/cache@v3
      with:
        path: ${{ env.ISABELLE_HOME_USER }}/heaps/
        key: heap-images-${{ github.ref_name }}
